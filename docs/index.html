<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Una propuesta seria, romantica y con baos de fondo."
    />
    <title>Plan de numeros 5</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <script>
      const planDate = "20 de junio de 2026";
      const noButtonMoveIntervalMs = 460;
      const times = ["12:00", "12:30", "13:00", "13:30"];
      const targetCatchCount = 5;
      const catchDurationSeconds = 14;
      const progressLabels = ["Si", "Hora", "Hambre", "5s", "4 baos", "Fortuna"];
      const fortunes = [
        "La salsa picante aprueba esta decisión.",
        "Hoy dos baos saben mejor que uno.",
        "El número 5 lleva escrito vuestro destino.",
        "Una cita improvisada cuenta doble.",
        "Si aparece hambre, aparece otro plato.",
        "El universo recomienda pedir para compartir.",
      ];
      const fortuneCookies = [0, 1, 2, 3];
      const memoryDeck = [
        { id: "bao-red", kind: "bao", label: "Bao rojo", art: "bao-red" },
        { id: "tea", kind: "decoy", label: "Te verde", art: "tea" },
        { id: "bao-gold", kind: "bao", label: "Bao dorado", art: "bao-gold" },
        { id: "noodles", kind: "decoy", label: "Fideos", art: "noodles" },
        { id: "chili", kind: "decoy", label: "Salsa", art: "chili" },
        { id: "bao-jade", kind: "bao", label: "Bao jade", art: "bao-jade" },
        { id: "chopsticks", kind: "decoy", label: "Palillos", art: "chopsticks" },
        { id: "bao-classic", kind: "bao", label: "Bao clasico", art: "bao-classic" },
        { id: "soy", kind: "decoy", label: "Soja", art: "soy" },
        { id: "rice", kind: "decoy", label: "Arroz", art: "rice" },
        { id: "soup", kind: "decoy", label: "Caldo", art: "soup" },
        { id: "gyoza", kind: "decoy", label: "Gyozas", art: "gyoza" },
      ];

      const state = {
        stage: "ask",
        noPosition: { left: 67, top: 58 },
        noAttempts: 0,
        selectedTime: "12:30",
        hungerLevel: 7,
        catchItems: [],
        catchPhase: "ready",
        catchTimeLeft: catchDurationSeconds,
        caughtFives: [],
        trapPenalty: 0,
        catchMessage: "Atrapa los 5 baos antes de que se enfrien.",
        memoryCards: [...memoryDeck],
        memoryPhase: "preview",
        memoryRound: 1,
        revealedMemoryIds: [],
        fortuneIndex: 0,
        openedCookie: null,
        showNoWarning: false,
        shareLabel: "Compartir plan",
      };

      const app = document.getElementById("app");
      let noTimer = null;
      let memoryTimer = null;
      let catchTimer = null;

      function shuffleDeck() {
        const shuffled = [...memoryDeck];
        for (let index = shuffled.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [shuffled[index], shuffled[randomIndex]] = [
            shuffled[randomIndex],
            shuffled[index],
          ];
        }
        return shuffled;
      }

      function foundBaos() {
        return state.revealedMemoryIds.filter((id) =>
          state.memoryCards.some((card) => card.id === id && card.kind === "bao"),
        ).length;
      }

      function currentFortune() {
        return fortunes[state.fortuneIndex];
      }

      function hungerVerdict() {
        if (state.hungerLevel <= 2) {
          return "Diagnóstico: hambre decorativa. Aun así, el protocolo recomienda abrir hueco para baos.";
        }

        if (state.hungerLevel <= 4) {
          return "Diagnóstico: hambre discreta. Con un par de baos entra en fase prometedora.";
        }

        if (state.hungerLevel <= 7) {
          return "Diagnóstico: hambre seria. Recomendación oficial: pedir baos sin ponerse solemnes.";
        }

        if (state.hungerLevel <= 9) {
          return "Diagnóstico: hambre de misión. Conviene pedir baos y no mirar atrás.";
        }

        return "Diagnóstico: hambre legendaria. Se activa el plan refuerzos: baos, algo más y cero dudas.";
      }

      function planText() {
        return `Plan aceptado: numeros 5 contigo el ${planDate} a las ${state.selectedTime}. Pruebas superadas: boton No esquivado, hambre ${state.hungerLevel}/10 con recomendacion de mas baos, ${state.caughtFives.length}/5 baos capturados, ${foundBaos()}/4 baos encontrados sin fallar y fortuna: "${currentFortune()}"`;
      }

      function getRandomNoPosition() {
        return {
          left: 5 + Math.round(Math.random() * 82),
          top: 42 + Math.round(Math.random() * 42),
        };
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function moveNo() {
        state.noAttempts += 1;
        state.noPosition = getRandomNoPosition();
        render();
      }

      function progressIndex() {
        return {
          ask: 0,
          time: 1,
          hunger: 2,
          catch: 3,
          hunt: 4,
          fortune: 5,
          done: 5,
        }[state.stage];
      }

      function createCatchItems() {
        const targets = [
          { label: "Bao rojo", art: "bao-red" },
          { label: "Bao dorado", art: "bao-gold" },
          { label: "Bao jade", art: "bao-jade" },
          { label: "Bao clasico", art: "bao-classic" },
          { label: "Bao extra", art: "bao-gold" },
        ].map((item, index) => ({
          ...item,
          id: `catch-bao-${index + 1}`,
          kind: "target",
        }));
        const traps = [
          { label: "Te verde", art: "tea" },
          { label: "Fideos", art: "noodles" },
          { label: "Salsa", art: "chili" },
          { label: "Palillos", art: "chopsticks" },
          { label: "Arroz", art: "rice" },
        ].map((item, index) => ({
          ...item,
          id: `trap-${index + 1}`,
          kind: "trap",
        }));

        const mixed = [...targets, ...traps];
        for (let index = mixed.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [mixed[index], mixed[randomIndex]] = [mixed[randomIndex], mixed[index]];
        }

        return mixed.map((item) => ({
          ...item,
          startX: randomBetween(10, 38),
          endX: randomBetween(62, 90),
          startY: randomBetween(4, 24),
          endY: randomBetween(68, 84),
          xDuration: randomBetween(2.8, 5.4),
          yDuration: randomBetween(3, 5.8),
          xDelay: -randomBetween(0, 4.8),
          yDelay: -randomBetween(0, 4.8),
          zIndex: Math.floor(randomBetween(2, 8)),
        }));
      }

      function triggerNoWarning() {
        if (state.showNoWarning) {
          return;
        }

        state.noAttempts += 1;
        state.showNoWarning = true;
        render(false);
      }

      function startMemoryRound() {
        state.memoryCards = shuffleDeck();
        state.revealedMemoryIds = [];
        state.memoryPhase = "preview";
        state.memoryRound += 1;
      }

      function resetCatchGame() {
        state.catchItems = createCatchItems();
        state.catchPhase = "ready";
        state.catchTimeLeft = catchDurationSeconds;
        state.caughtFives = [];
        state.trapPenalty = 0;
        state.catchMessage = "Atrapa los 5 baos antes de que se enfrien.";
      }

      function startCatchGame() {
        state.catchItems = createCatchItems();
        state.catchPhase = "playing";
        state.catchTimeLeft = catchDurationSeconds;
        state.caughtFives = [];
        state.trapPenalty = 0;
        state.catchMessage = "Toca los baos. Evita los distractores disfrazados de comida.";
        render(false);
      }

      function handleCatchItem(itemId) {
        if (state.catchPhase !== "playing" || state.caughtFives.includes(itemId)) {
          return;
        }

        const item = state.catchItems.find((entry) => entry.id === itemId);
        if (!item) {
          return;
        }

        if (item.kind === "trap") {
          state.trapPenalty += 1;
          state.catchTimeLeft = Math.max(0, state.catchTimeLeft - 1);

          if (state.catchTimeLeft === 0) {
            state.catchPhase = "lost";
            state.catchMessage = "La trampa ha ganado por ahora. Reintento honorable.";
          } else {
            state.catchMessage = `Eso era "${item.label}". Penalizacion culinaria: -1 segundo.`;
          }

          render(false);
          return;
        }

        state.caughtFives = [...state.caughtFives, item.id];

        if (state.caughtFives.length >= targetCatchCount) {
          state.catchPhase = "won";
          state.catchMessage = "Has demostrado reflejos, hambre y compromiso bao. Procede la cita.";
          render(false);
          window.setTimeout(() => {
            startMemoryRound();
            state.stage = "hunt";
            render();
          }, 900);
          return;
        }

        state.catchMessage = `Bien. Quedan ${
          targetCatchCount - state.caughtFives.length
        } baos por capturar.`;
        render(false);
      }

      function chooseFortuneCookie(cookieIndex) {
        if (state.openedCookie !== null) {
          return;
        }

        state.openedCookie = cookieIndex;
        state.fortuneIndex = Math.floor(Math.random() * fortunes.length);
      }

      function scrollToStage() {
        if (state.stage === "ask") {
          return;
        }

        const sectionId = {
          time: "step-time",
          hunger: "step-hunger",
          catch: "step-catch",
          hunt: "step-hunt",
          fortune: "step-fortune",
          done: "step-done",
        }[state.stage];

        window.setTimeout(() => {
          document.getElementById(sectionId)?.scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        }, 80);
      }

      function clearTimers() {
        if (noTimer) {
          window.clearInterval(noTimer);
          noTimer = null;
        }

        if (memoryTimer) {
          window.clearTimeout(memoryTimer);
          memoryTimer = null;
        }

        if (catchTimer) {
          window.clearInterval(catchTimer);
          catchTimer = null;
        }
      }

      function scheduleTimers() {
        clearTimers();

        if (state.stage === "ask") {
          noTimer = window.setInterval(() => {
            state.noPosition = getRandomNoPosition();
            render(false);
          }, noButtonMoveIntervalMs);
        }

        if (state.stage === "hunt" && state.memoryPhase === "preview") {
          memoryTimer = window.setTimeout(() => {
            state.memoryPhase = "playing";
            render();
          }, 2000);
        }

        if (state.stage === "catch" && state.catchPhase === "playing") {
          catchTimer = window.setInterval(() => {
            if (state.catchTimeLeft <= 1) {
              state.catchTimeLeft = 0;
              state.catchPhase = "lost";
              state.catchMessage = "Tiempo agotado. Los baos han escapado temporalmente.";
            } else {
              state.catchTimeLeft -= 1;
            }

            render(false);
          }, 1000);
        }
      }

      function memoryStatus() {
        return {
          preview: "Memoriza las tarjetas: en 2 segundos se voltean.",
          playing: "Ahora encuentra los 4 baos. Si fallas, vuelta a empezar.",
          failed: "Ups: eso no era un bao. Reiniciando la ronda...",
          won: "Perfecto: 4 baos localizados sin fallar.",
        }[state.memoryPhase];
      }

      function heroHtml() {
        const askHtml =
          state.stage === "ask"
            ? `
              <div class="answer-zone" aria-live="polite">
                <button class="yes-button" type="button" data-action="accept">
                  Sí, por supuesto!
                </button>

                <button
                  class="no-button"
                  style="left: ${state.noPosition.left}%; top: ${state.noPosition.top}%"
                  type="button"
                  data-action="no-warning"
                >
                  No
                </button>

                <p class="hint">
                  ${
                    state.noAttempts === 0
                      ? "El boton pequeno tiene poca vocacion de permanencia."
                      : `Intentos de No anulados por el universo: ${state.noAttempts}`
                  }
                </p>
              </div>
            `
            : "";

        const progressHtml =
          state.stage !== "ask"
            ? `
              <div class="progress" aria-label="Progreso del plan">
                ${progressLabels
                  .map((item, index) => {
                    return `<span class="${index <= progressIndex() ? "is-active" : ""}">${item}</span>`;
                  })
                  .join("")}
              </div>
            `
            : "";

        return `
          <section class="hero" id="plan-card">
            <div class="hero__inner">
              <p class="eyebrow">Solicitud oficial de plan</p>
              <h1>¿Quieres ir a por unos números 5 conmigo?</h1>
              <p class="hero__copy">
                Prometo compañía excelente y cero reticencias a pedir más baos.
              </p>
              ${askHtml}
              ${progressHtml}
            </div>
          </section>
        `;
      }

      function timeHtml() {
        if (state.stage !== "time") {
          return "";
        }

        return `
          <section class="step-panel" id="step-time">
            <div class="step-heading">
              <p class="eyebrow">Paso 1</p>
              <h2>Elige la hora de encuentro</h2>
            </div>

            <div class="date-strip">
              Día del plan: <strong>${planDate}</strong>.
            </div>

            <div class="time-grid">
              ${times
                .map(
                  (time) => `
                    <button
                      class="${state.selectedTime === time ? "time-chip is-picked" : "time-chip"}"
                      type="button"
                      data-action="time"
                      data-time="${time}"
                    >
                      ${time}
                    </button>
                  `,
                )
                .join("")}
            </div>

            <div class="note-strip">
              Hora elegida: <strong>${state.selectedTime}</strong>. Margen de llegada permitido:
              el necesario para tener hambre.
            </div>

            <button class="primary-action" type="button" data-action="start-hunger">
              Continuar a la calculadora de hambre
            </button>
          </section>
        `;
      }

      function hungerHtml() {
        if (state.stage !== "hunger") {
          return "";
        }

        return `
          <section class="step-panel hunger-panel" id="step-hunger">
            <div class="step-heading">
              <p class="eyebrow">Mini juego</p>
              <h2>Calculadora de hambre</h2>
            </div>

            <label class="hunger-meter">
              <span>Nivel declarado de hambre</span>
              <strong>${state.hungerLevel}/10</strong>
              <input
                aria-label="Nivel de hambre"
                max="10"
                min="0"
                type="range"
                value="${state.hungerLevel}"
              />
            </label>

            <div class="hunger-verdict" aria-live="polite">
              ${hungerVerdict()}
            </div>

            <button class="primary-action" type="button" data-action="start-catch-stage">
              Aceptar diagnóstico y cazar baos
            </button>
          </section>
        `;
      }

      function catchHtml() {
        if (state.stage !== "catch") {
          return "";
        }

        const itemsHtml = state.catchItems
              .map((item) => {
            const isCaught = state.caughtFives.includes(item.id);
            return `
              <button
                aria-label="${item.kind === "target" ? item.label : `Trampa ${item.label}`}"
                class="falling-item ${item.kind === "target" ? "is-target" : "is-trap"} ${
                  isCaught ? "is-caught" : ""
                }"
                ${state.catchPhase !== "playing" || isCaught ? "disabled" : ""}
                style="--start-x: ${item.startX}%; --end-x: ${item.endX}%; --start-y: ${item.startY}%; --end-y: ${item.endY}%; --x-duration: ${item.xDuration}s; --y-duration: ${item.yDuration}s; --x-delay: ${item.xDelay}s; --y-delay: ${item.yDelay}s; z-index: ${item.zIndex}"
                type="button"
                data-action="catch-item"
                data-catch-id="${item.id}"
              >
                <span class="falling-art food-art ${item.art}" aria-hidden="true"></span>
              </button>
            `;
          })
          .join("");

        return `
          <section class="step-panel catch-panel" id="step-catch">
            <div class="step-heading">
              <p class="eyebrow">Mini juego</p>
              <h2>Atrapa los 5 baos</h2>
            </div>

            <div class="catch-scoreboard" aria-live="polite">
              <div>
                <strong>${state.caughtFives.length}</strong>
                <span>/ ${targetCatchCount}</span>
              </div>
              <div>
                <strong>${state.catchTimeLeft}</strong>
                <span>s</span>
              </div>
              <div>
                <strong>${state.trapPenalty}</strong>
                <span>trampas</span>
              </div>
            </div>

            <p class="catch-message">${state.catchMessage}</p>

            <div
              class="${state.catchPhase === "playing" ? "catch-arena is-live" : "catch-arena"}"
              aria-label="Juego de atrapar baos"
            >
              ${itemsHtml}
            </div>

            ${
              state.catchPhase !== "playing" && state.catchPhase !== "won"
                ? `
                  <button class="primary-action" type="button" data-action="start-catch-game">
                    ${state.catchPhase === "lost" ? "Reintentar captura" : "Empezar captura"}
                  </button>
                `
                : ""
            }
          </section>
        `;
      }

      function memoryHtml() {
        if (state.stage !== "hunt") {
          return "";
        }

        return `
          <section class="step-panel" id="step-hunt">
            <div class="step-heading">
              <p class="eyebrow">Mini juego</p>
              <h2>Encuentra los 4 baos sin fallar</h2>
            </div>

            <div class="memory-head">
              <div class="bao-counter" aria-live="polite">
                <span>${foundBaos()}</span>
                <span>/ 4 baos</span>
              </div>
              <p>${memoryStatus()}</p>
            </div>

            <div class="memory-board" aria-label="Juego de memoria de baos">
              ${state.memoryCards
                .map((card) => {
                  const isVisible =
                    state.memoryPhase === "preview" ||
                    state.revealedMemoryIds.includes(card.id);
                  const isWrong =
                    state.memoryPhase === "failed" &&
                    state.revealedMemoryIds.includes(card.id);
                  const disabled =
                    state.memoryPhase !== "playing" ||
                    state.revealedMemoryIds.includes(card.id);

                  return `
                    <button
                      aria-label="${isVisible ? card.label : "Tarjeta oculta"}"
                      class="memory-card ${isVisible ? "is-visible" : ""} ${
                        card.kind === "bao" ? "is-bao-card" : "is-decoy-card"
                      } ${isWrong ? "is-wrong" : ""}"
                      ${disabled ? "disabled" : ""}
                      type="button"
                      data-action="memory-card"
                      data-card-id="${card.id}"
                    >
                      <span class="memory-card__inner" aria-hidden="true">
                        <span class="memory-card__face memory-card__front">
                          <span class="food-art ${card.art}"></span>
                          <span>${card.label}</span>
                        </span>
                        <span class="memory-card__face memory-card__back">?</span>
                      </span>
                    </button>
                  `;
                })
                .join("")}
            </div>

            <button class="secondary-action memory-reset" type="button" data-action="restart-memory">
              Barajar y empezar otra vez
            </button>
          </section>
        `;
      }

      function fortuneHtml() {
        if (state.stage !== "fortune") {
          return "";
        }

        const cookiesHtml = fortuneCookies
          .map((cookieIndex) => {
            const isOpen = state.openedCookie === cookieIndex;
            const disabled = state.openedCookie !== null && !isOpen;
            return `
              <button
                aria-label="${isOpen ? "Galleta abierta" : `Galleta ${cookieIndex + 1} cerrada`}"
                class="${isOpen ? "fortune-cookie-button is-open" : "fortune-cookie-button"}"
                ${disabled ? "disabled" : ""}
                type="button"
                data-action="fortune-cookie"
                data-cookie-index="${cookieIndex}"
              >
                <span class="fortune-cookie-shape" aria-hidden="true"></span>
                <span>${isOpen ? "Abierta" : "Cerrada"}</span>
              </button>
            `;
          })
          .join("");

        return `
          <section class="step-panel fortune-panel" id="step-fortune">
            <div class="step-heading">
              <p class="eyebrow">Mini juego</p>
              <h2>Consulta la galleta de la suerte</h2>
            </div>

            <div class="fortune-cookie-grid" aria-label="Galletas de la suerte cerradas">
              ${cookiesHtml}
            </div>

            ${
              state.openedCookie === null
                ? `<p class="fortune-hint">Elige una galleta. Solo una trae el mensaje oficial.</p>`
                : `
                  <div class="fortune-cookie" aria-live="polite">
                    <span>“${currentFortune()}”</span>
                  </div>
                `
            }

            <div class="fortune-actions">
              ${
                state.openedCookie !== null
                  ? `
                    <button class="secondary-action" type="button" data-action="reset-cookie">
                      Elegir otra galleta
                    </button>
                  `
                  : ""
              }
              <button
                class="primary-action"
                ${state.openedCookie === null ? "disabled" : ""}
                type="button"
                data-action="done"
              >
                Sellar el plan
              </button>
            </div>
          </section>
        `;
      }

      function receiptHtml() {
        if (state.stage !== "done") {
          return "";
        }

        return `
          <section class="receipt" id="step-done">
            <p class="eyebrow">Veredicto</p>
            <h2>Plan aprobado con honores</h2>
            <dl>
              <div>
                <dt>Destino</dt>
                <dd>Números 5</dd>
              </div>
              <div>
                <dt>Día</dt>
                <dd>${planDate}</dd>
              </div>
              <div>
                <dt>Hora</dt>
                <dd>${state.selectedTime}</dd>
              </div>
              <div>
                <dt>Estado emocional</dt>
                <dd>Hambre ${state.hungerLevel}/10, científicamente compatible con pedir más baos</dd>
              </div>
              <div>
                <dt>Reflejos</dt>
                <dd>${state.caughtFives.length}/5 baos capturados</dd>
              </div>
              <div>
                <dt>Fortuna</dt>
                <dd>${currentFortune()}</dd>
              </div>
            </dl>

            <div class="receipt-actions">
              <button class="primary-action" type="button" data-action="share">
                ${state.shareLabel}
              </button>
              <a
                class="secondary-action"
                href="https://wa.me/?text=${encodeURIComponent(planText())}"
                rel="noreferrer"
                target="_blank"
              >
                Mandar por WhatsApp
              </a>
            </div>
          </section>
        `;
      }

      function noWarningHtml() {
        if (!state.showNoWarning) {
          return "";
        }

        return `
          <div class="no-warning" role="dialog" aria-modal="true" aria-labelledby="no-warning-title">
            <div class="no-warning__panel">
              <img alt="" src="./devil-warning.png" />
              <h2 id="no-warning-title">¿Estás seguro?</h2>
              <button class="primary-action" type="button" data-action="close-no-warning">
                Mejor vamos a por baos
              </button>
            </div>
          </div>
        `;
      }

      function render(shouldScroll = true) {
        app.innerHTML = `
          <main class="bao-shell">
            ${heroHtml()}
            ${timeHtml()}
            ${hungerHtml()}
            ${catchHtml()}
            ${memoryHtml()}
            ${fortuneHtml()}
            ${receiptHtml()}
            ${noWarningHtml()}
          </main>
        `;

        bindEvents();
        scheduleTimers();

        if (shouldScroll) {
          scrollToStage();
        }
      }

      function bindEvents() {
        document.querySelectorAll("[data-action]").forEach((element) => {
          element.addEventListener("click", handleAction);
        });

        const noButton = document.querySelector(".no-button");
        if (noButton) {
          noButton.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            triggerNoWarning();
          });
        }

        const hungerInput = document.querySelector(".hunger-meter input");
        if (hungerInput) {
          hungerInput.addEventListener("input", (event) => {
            state.hungerLevel = Number(event.currentTarget.value);
            render(false);
          });
        }
      }

      async function sharePlan() {
        const shareData = {
          title: "Plan de numeros 5",
          text: planText(),
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
            state.shareLabel = "Plan enviado";
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(planText());
            state.shareLabel = "Plan copiado";
          } else {
            state.shareLabel = "Listo para celebrar";
          }
        } catch {
          state.shareLabel = "Plan guardado aqui";
        }

        render(false);
      }

      function handleMemoryCard(cardId) {
        if (
          state.memoryPhase !== "playing" ||
          state.revealedMemoryIds.includes(cardId)
        ) {
          return;
        }

        const card = state.memoryCards.find((item) => item.id === cardId);
        if (!card) {
          return;
        }

        if (card.kind !== "bao") {
          state.revealedMemoryIds = [...state.revealedMemoryIds, card.id];
          state.memoryPhase = "failed";
          render(false);
          window.setTimeout(() => {
            startMemoryRound();
            render(false);
          }, 1150);
          return;
        }

        state.revealedMemoryIds = [...state.revealedMemoryIds, card.id];
        if (foundBaos() >= 4) {
          state.memoryPhase = "won";
          render(false);
          window.setTimeout(() => {
            state.stage = "fortune";
            state.openedCookie = null;
            render();
          }, 650);
          return;
        }

        render(false);
      }

      function handleAction(event) {
        const action = event.currentTarget.getAttribute("data-action");

        if (action === "accept") {
          state.stage = "time";
        }

        if (action === "no-warning") {
          triggerNoWarning();
          return;
        }

        if (action === "close-no-warning") {
          state.showNoWarning = false;
        }

        if (action === "time") {
          state.selectedTime = event.currentTarget.getAttribute("data-time");
        }

        if (action === "start-hunger") {
          state.stage = "hunger";
        }

        if (action === "start-catch-stage") {
          resetCatchGame();
          state.stage = "catch";
        }

        if (action === "start-catch-game") {
          startCatchGame();
          return;
        }

        if (action === "catch-item") {
          handleCatchItem(event.currentTarget.getAttribute("data-catch-id"));
          return;
        }

        if (action === "start-memory") {
          startMemoryRound();
          state.stage = "hunt";
        }

        if (action === "restart-memory") {
          startMemoryRound();
        }

        if (action === "memory-card") {
          handleMemoryCard(event.currentTarget.getAttribute("data-card-id"));
          return;
        }

        if (action === "fortune-cookie") {
          chooseFortuneCookie(Number(event.currentTarget.getAttribute("data-cookie-index")));
        }

        if (action === "reset-cookie") {
          state.openedCookie = null;
        }

        if (action === "done") {
          if (state.openedCookie === null) {
            return;
          }
          state.stage = "done";
        }

        if (action === "share") {
          sharePlan();
          return;
        }

        render();
      }

      render();
    </script>
  </body>
</html>
